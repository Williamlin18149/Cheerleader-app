.btn-red{background:#C62828;color:#fff}

.btn-gray{background:#e0e0e0;color:#444}
.btn-blue{background:#1565C0;color:#fff}

const {useState,useEffect,useMemo,useRef}=React;
const e=React.createElement;
const san=s=>s.trim().replace(/[\s/\\'"]/g,"_").slice(0,25)||"user";
const EMPTY_FORM={n:"",nat:"T",t:[],r:"正式",note:""};

/** 成員所屬球隊 id（Firebase 可能存成數字，統一成字串以利 TEAMS 比對） */
function memberTeamIds(m){
  if(!m||!Array.isArray(m.t))return[];
  return m.t.map(id=>String(id)).filter(Boolean);
}
/** 依目前聯盟篩選要顯示的球隊標籤（選定聯盟時不顯示其他聯盟隊名，避免誤解篩選錯誤） */
function memberTeamIdsForBrowseTags(m,league){
  const ids=memberTeamIds(m);
  if(league==="all")return ids;
  return ids.filter(id=>TEAMS[id]&&TEAMS[id].l===league);
}

function App(){
  /* ── 一般狀態 ── */
  const [phase,setPhase]=useState("loading");
  const [myName,setMyName]=useState("");
  const [roomCode,setRoomCode]=useState("");
  const [inName,setInName]=useState("");
  const [inRoom,setInRoom]=useState("");
  const [myFaves,setMyFaves]=useState([]);
  const [roomData,setRoomData]=useState({});
  const [online,setOnline]=useState(true);
  const [tab,setTab]=useState("browse");
  const [lf,setLf]=useState("all");
  const [tf,setTf]=useState("all");
  const [nf,setNf]=useState("all");
  const [multi,setMulti]=useState(false);
  const [browseFriendFilter,setBrowseFriendFilter]=useState("all");
  const [roomMemberDetail,setRoomMemberDetail]=useState(null);
  const [q,setQ]=useState("");
  const [joinErr,setJoinErr]=useState("");
  const [joining,setJoining]=useState(false);
  const [restored,setRestored]=useState(false);
  /* ── 成員列表（可編輯）── */
  const [members,setMembers]=useState(DEFAULT_MEMBERS);
  /* ── 管理員狀態 ── */
  const [adminPhase,setAdminPhase]=useState("pw"); // pw | panel
  const [adminSection,setAdminSection]=useState("rooms");
  const [adminPw,setAdminPw]=useState("");
  const [adminErr,setAdminErr]=useState("");
  const [allRooms,setAllRooms]=useState({});
  const [roomsLoading,setRoomsLoading]=useState(false);
  /** 房間列表僅能顯示部分時的說明（例如 RTDB 規則不允許讀取 /rooms 根節點） */
  const [adminRoomsNotice,setAdminRoomsNotice]=useState("");
  /* ── 啦啦隊編輯器 ── */
  const [medQ,setMedQ]=useState("");
  const [medTf,setMedTf]=useState("all");
  const [medLf,setMedLf]=useState("all");
  const [editingMember,setEditingMember]=useState(null); // null | "new" | member obj
  const [form,setForm]=useState(EMPTY_FORM);
  const [saving,setSaving]=useState(false);
  const dbRef=useRef(null);

  /* ── 頁面載入：從 Firebase 拉最新成員名單 ── */
  useEffect(()=>{
    db.ref("config/members").once("value").then(snap=>{
      const custom=snap.val();
      if(custom&&Array.isArray(custom)&&custom.length>0) setMembers(sortMembersByTeam(custom));
    }).catch(()=>{});

    try{
      const saved=localStorage.getItem(SESSION_KEY);
      if(saved){
        const {name,room}=JSON.parse(saved);
        if(name&&room){autoRejoin(san(name),san(room));return;}
      }
    }catch(e){}
    setPhase("join");
  },[]);

  /* ── Firebase 即時監聽（進入房間後）── */
  useEffect(()=>{
    if(phase!=="app"||!roomCode)return;
    const ref=db.ref(`rooms/${roomCode}/members`);
    ref.on("value",snap=>setRoomData(snap.val()||{}));
    const connRef=db.ref(".info/connected");
    connRef.on("value",snap=>setOnline(!!snap.val()));
    dbRef.current=ref;
    return()=>{ref.off();connRef.off();};
  },[phase,roomCode]);

  /* ── 動作：自動重新登入 ── */
  const AUTO_REJOIN_MS=12000;
  const autoRejoin=async(name,room)=>{
    try{
      const snap=await Promise.race([
        db.ref(`rooms/${room}/members/${name}`).once("value"),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),AUTO_REJOIN_MS)),
      ]);
      const faves=snap.val()?.faves||[];
      setMyName(name);setRoomCode(room);setMyFaves(faves);setRestored(true);setPhase("app");
    }catch(e){setPhase("join");}
  };

  /* ── 動作：加入房間 ── */
  const join=async()=>{
    const nm=san(inName),rm=san(inRoom);
    if(!nm||!rm){setJoinErr("請填寫暱稱和房間碼");return;}
    setJoining(true);setJoinErr("");
    try{
      const snap=await db.ref(`rooms/${rm}/members/${nm}`).once("value");
      const faves=snap.val()?.faves||[];
      await db.ref(`rooms/${rm}/members/${nm}`).set({name:nm,faves,ts:firebase.database.ServerValue.TIMESTAMP});
      localStorage.setItem(SESSION_KEY,JSON.stringify({name:nm,room:rm}));
      setMyName(nm);setRoomCode(rm);setMyFaves(faves);setRestored(faves.length>0);setPhase("app");
    }catch(err){setJoinErr("連線失敗："+err.message);}
    setJoining(false);
  };

  /* ── 動作：登出 ── */
  const leave=()=>{
    localStorage.removeItem(SESSION_KEY);
    if(dbRef.current)dbRef.current.off();
    setPhase("join");setMyName("");setRoomCode("");setMyFaves([]);setRoomData({});setRestored(false);
    setBrowseFriendFilter("all");setRoomMemberDetail(null);
  };

  /* ── 動作：切換喜愛 ── */
  const toggleFave=id=>{
    setMyFaves(prev=>{
      const next=prev.includes(id)?prev.filter(x=>x!==id):[...prev,id];
      db.ref(`rooms/${roomCode}/members/${myName}`).update({faves:next,ts:firebase.database.ServerValue.TIMESTAMP}).catch(()=>{});
      return next;
    });
  };

  /* ── 管理員：登入 ── */
  const adminLogin=()=>{
    if(adminPw===ADMIN_PASSWORD){setAdminPhase("panel");setAdminErr("");loadAllRooms();}
    else{setAdminErr("密碼錯誤");}
  };

  /* ── 管理員：載入所有房間 ──
     若規則僅允許讀 rooms/{房號}/members（無法讀整棵 rooms），改讀目前所在房間的 members。 */
  const loadRoomMembersAsRooms=async(code)=>{
    const snap=await db.ref(`rooms/${code}/members`).once("value");
    return{[code]:{members:snap.val()||{}}};
  };
  const loadAllRooms=async()=>{
    setRoomsLoading(true);
    setAdminRoomsNotice("");
    try{
      const snap=await db.ref("rooms").once("value");
      let rooms=snap.val();
      if(!rooms||typeof rooms!=="object"||Array.isArray(rooms))rooms={};
      let keys=Object.keys(rooms);
      if(keys.length===0&&roomCode){
        rooms=await loadRoomMembersAsRooms(roomCode);
        keys=Object.keys(rooms);
        if(keys.length)setAdminRoomsNotice("無法從根節點讀取房間清單（可能為資料庫權限），以下僅顯示您目前所在房間。");
      }
      setAllRooms(rooms);
    }catch(err){
      const msg=err&&err.message?String(err.message):String(err);
      if(roomCode){
        try{
          setAllRooms(await loadRoomMembersAsRooms(roomCode));
          setAdminRoomsNotice(`無法讀取全部房間（${msg}）。以下僅顯示您目前所在房間；若需管理其他房間，請在 Firebase 即時資料庫規則開放對「rooms」的讀取權限，或由有權限的後台操作。`);
        }catch(e2){
          setAllRooms({});
          setAdminRoomsNotice(`無法載入房間資料：${msg}`);
        }
      }else{
        setAllRooms({});
        setAdminRoomsNotice(`無法載入房間資料：${msg}（請先從首頁進入某一房間後再開管理後台，即可至少管理該房。）`);
      }
    }
    setRoomsLoading(false);
  };

  /* ── 管理員：刪除房間成員 ── */
  const deleteRoomMember=async(room,member)=>{
    if(!confirm(`確定刪除「${member}」？`))return;
    await db.ref(`rooms/${room}/members/${member}`).remove();
    loadAllRooms();
  };

  /* ── 管理員：清空成員選擇（不刪帳號）── */
  const clearMemberFaves=async(room,member)=>{
    await db.ref(`rooms/${room}/members/${member}/faves`).set([]);
    loadAllRooms();
  };

  /* ── 管理員：清空整個房間 ── */
  const clearRoom=async(room)=>{
    if(!confirm(`確定清空「${room}」整個房間？所有人將被刪除。`))return;
    await db.ref(`rooms/${room}`).remove();
    loadAllRooms();
  };

  /* ── 管理員：儲存成員列表到 Firebase ── */
  const saveMembers=async(list)=>{
    const sorted=sortMembersByTeam(list);
    await db.ref("config/members").set(sorted);
    setMembers(sorted);
  };

  /* ── 管理員：新增 / 編輯 啦啦隊成員 ── */
  const openNew=()=>{setForm(EMPTY_FORM);setEditingMember("new");};
  const openEdit=m=>{setForm({n:m.n,nat:m.nat,t:[...m.t],r:m.r,note:m.note||""});setEditingMember(m);};
  const cancelEdit=()=>{setEditingMember(null);setForm(EMPTY_FORM);};

  const submitForm=async()=>{
    const name=form.n.trim();
    if(!name){alert("請填寫姓名");return;}
    if(form.t.length===0){alert("請至少選一個球隊");return;}
    const dup=members.find(m=>m.n.trim().toLowerCase()===name.toLowerCase()&&(editingMember==="new"||m.id!==editingMember.id));
    if(dup){
      const teamNames=dup.t.map(tid=>TEAMS[tid]?.n).filter(Boolean).join("、");
      alert(`名單中已有「${dup.n}」（${teamNames||"無球隊"}），無法重複新增。\n若要修改請回列表點選「編輯」。`);
      return;
    }
    setSaving(true);
    let list;
    if(editingMember==="new"){
      const maxId=Math.max(0,...members.map(m=>m.id));
      list=[...members,{...form,n:name,id:maxId+1}];
    }else{
      list=members.map(m=>m.id===editingMember.id?{...form,n:name,id:m.id}:m);
    }
    await saveMembers(list);
    setEditingMember(null);setForm(EMPTY_FORM);setSaving(false);
  };

  const deleteMemberFromList=async(id,name)=>{
    if(!confirm(`確定刪除「${name}」？`))return;
    await saveMembers(members.filter(m=>m.id!==id));
  };

  const resetToDefault=async()=>{
    if(!confirm("確定還原成預設名單？所有自訂修改將消失。"))return;
    await saveMembers(DEFAULT_MEMBERS);
  };

  /* ── 計算 ── */
  const memberNames=Object.keys(roomData);
  const colorMap=useMemo(()=>{const m={};memberNames.forEach((nm,i)=>{m[nm]=FC[i%FC.length];});return m;},[memberNames.join(",")]);

  const filtered=useMemo(()=>{
    let list=members.filter(m=>{
      const tids=memberTeamIds(m);
      if(multi&&(m.t||[]).length<2)return false;
      if(q&&!m.n.toLowerCase().includes(q.toLowerCase()))return false;
      if(nf!=="all"&&m.nat!==nf)return false;
      if(lf!=="all"&&!tids.some(id=>TEAMS[id]&&TEAMS[id].l===lf))return false;
      if(tf!=="all"&&!tids.includes(String(tf)))return false;
      return true;
    });
    if(browseFriendFilter!=="all"){
      const pick=new Set(roomData[browseFriendFilter]?.faves||[]);
      list=list.filter(m=>pick.has(m.id));
    }
    return list;
  },[members,lf,tf,nf,multi,q,browseFriendFilter,roomData]);

  const overlapMembers=useMemo(()=>{
    const counts={};const who={};
    Object.entries(roomData).forEach(([nm,d])=>{
      (d.faves||[]).forEach(id=>{counts[id]=(counts[id]||0)+1;if(!who[id])who[id]=[];who[id].push(nm);});
    });
    return Object.entries(counts).filter(([,c])=>c>1).sort((a,b)=>b[1]-a[1])
      .map(([id,cnt])=>({m:members.find(x=>x.id===+id),cnt,likers:who[+id]||[]})).filter(x=>x.m);
  },[roomData,members]);

  const whoLikes=id=>Object.entries(roomData).filter(([,d])=>(d.faves||[]).includes(id)).map(([nm])=>nm);
  const teamsByLf=Object.entries(TEAMS).filter(([,v])=>lf==="all"||v.l===lf);
  const sortedRoomNicknames=useMemo(()=>([...memberNames].sort((a,b)=>a.localeCompare(b,"zh-Hant"))),[memberNames.join(",")]);

  /* ════════════════════════════════
     RENDER: LOADING
  ════════════════════════════════ */
  if(phase==="loading")return e("div",{style:{textAlign:"center",padding:"3rem",color:"#bbb"}},"自動登入中...");

  /* ════════════════════════════════
     RENDER: JOIN
  ════════════════════════════════ */
  if(phase==="join")return e("div",{className:"join-wrap"},
    e("div",{className:"join-box"},
      e("div",{className:"join-logo"},"🎉"),
      e("h1",null,"台灣啦啦隊支持表"),
      e("p",{className:"sub"},"選擇自動儲存・關掉再開都還在！"),
      e("div",{className:"alert warn"},"⚠ 同房間碼的人可互相看到選擇"),
      e("div",{className:"field"},e("label",{className:"lbl"},"你的暱稱"),
        e("input",{type:"text",placeholder:"例：小明",value:inName,maxLength:20,
          onChange:ev=>setInName(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&join()})),
      e("div",{className:"field"},e("label",{className:"lbl"},"房間碼（和朋友用同一組）"),
        e("input",{type:"text",placeholder:"例：朋友圈2025",value:inRoom,maxLength:25,
          onChange:ev=>setInRoom(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&join()})),
      joinErr&&e("div",{className:"alert err"},joinErr),
      e("button",{className:"btn btn-primary btn-join",onClick:join,disabled:joining},joining?"連線中...":"進入房間 →"),
      e("span",{className:"admin-link",onClick:()=>{setPhase("admin");setAdminPhase("pw");}},"⚙ 管理員入口")
    )
  );

  /* ════════════════════════════════
     RENDER: ADMIN
  ════════════════════════════════ */
  if(phase==="admin"){
    const backBtn=e("button",{className:"hbtn",onClick:()=>{setPhase(myName?"app":"join");setAdminPw("");setAdminPhase("pw");}},"← 返回");

    /* 管理員密碼輸入 */
    if(adminPhase==="pw")return e("div",null,
      e("div",{className:"admin-header"},e("h2",null,"⚙ 管理員登入"),backBtn),
      e("div",{className:"pw-box"},
        e("h2",null,"管理員驗證"),
        e("p",null,"請輸入管理員密碼"),
        e("label",{className:"lbl"},"密碼"),
        e("input",{type:"password",placeholder:"密碼",value:adminPw,
          onChange:ev=>setAdminPw(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&adminLogin(),style:{marginBottom:10}}),
        adminErr&&e("div",{className:"alert err",style:{marginBottom:10}},adminErr),
        e("button",{className:"btn btn-primary",style:{width:"100%",padding:10},onClick:adminLogin},"進入管理後台")
      )
    );

    /* 管理面板 */
    const medTeamsByLf=Object.entries(TEAMS).filter(([,v])=>medLf==="all"||v.l===medLf);
    const medFiltered=members.filter(m=>{
      if(medQ&&!m.n.toLowerCase().includes(medQ.toLowerCase()))return false;
      if(medLf!=="all"&&!m.t.some(id=>TEAMS[id]?.l===medLf))return false;
      if(medTf!=="all"&&!m.t.includes(medTf))return false;
      return true;
    });

    return e("div",null,
      e("div",{className:"admin-header"},
        e("h2",null,"⚙ 管理後台"),
        e("span",{className:"admin-badge"},"管理員"),
        backBtn
      ),
      e("div",{className:"admin-tabs"},
        [["rooms","🏠 房間管理"],["members","🎤 啦啦隊名單編輯"]].map(([k,l])=>
          e("button",{key:k,className:`admin-tab${adminSection===k?" on":""}`,onClick:()=>{setAdminSection(k);setEditingMember(null);}},l)
        )
      ),

      /* ── 房間管理 ── */
      adminSection==="rooms"&&e("div",null,
        adminRoomsNotice&&e("div",{className:"alert warn",style:{marginBottom:10}},adminRoomsNotice),
        e("div",{style:{display:"flex",gap:8,marginBottom:10}},
          e("button",{className:"btn btn-blue",onClick:loadAllRooms},"🔄 重新整理"),
          e("span",{style:{fontSize:12,color:"#aaa",alignSelf:"center"}},`共 ${Object.keys(allRooms).length} 個房間`)
        ),
        roomsLoading&&e("div",{className:"empty"},"載入中..."),
        Object.keys(allRooms).length===0&&!roomsLoading&&e("div",{className:"empty"},"目前沒有任何房間資料"),
        Object.entries(allRooms).map(([room,rdata])=>{
          const mems=Object.entries(rdata.members||{});
          return e("div",{key:room,className:"room-block"},
            e("div",{className:"room-block-header"},
              e("span",{className:"room-name"},`🏠 ${room}`),
              e("span",{className:"room-meta"},`${mems.length} 位成員`),
              e("button",{className:"btn btn-red btn-sm",onClick:()=>clearRoom(room)},"清空房間")
            ),
            mems.map(([nm,d])=>
              e("div",{key:nm,className:"member-row"},
                e("span",{className:"member-row-name"},nm+(nm===myName?" (我)":"")),
                e("span",{className:"member-row-faves"},`已選 ${(d.faves||[]).length} 位`),
                e("button",{className:"btn btn-gray btn-sm",style:{marginRight:4},onClick:()=>clearMemberFaves(room,nm)},"清空選擇"),
                e("button",{className:"btn btn-red btn-sm",onClick:()=>deleteRoomMember(room,nm)},"刪除成員")
              )
            )
          );
        })
      ),

      /* ── 啦啦隊名單編輯 ── */
      adminSection==="members"&&e("div",null,

        /* 表單 */
        editingMember&&e("div",{className:"form-panel"},
          e("h3",null,editingMember==="new"?"➕ 新增成員":"✏️ 編輯："+editingMember.n),
          e("div",{className:"form-row"},
            e("div",null,
              e("label",{className:"lbl"},"姓名 *"),
              e("input",{type:"text",value:form.n,onChange:ev=>setForm({...form,n:ev.target.value}),placeholder:"成員姓名"})
            ),
            e("div",null,
              e("label",{className:"lbl"},"身份 *"),
              e("select",{value:form.r,onChange:ev=>setForm({...form,r:ev.target.value})},
                ["隊長","外援","正式","練習生","總監"].map(r=>e("option",{key:r,value:r},r))
              )
            )
          ),
          e("label",{className:"lbl"},"國籍 *"),
          e("div",{className:"nat-btns"},
            [["T","🇹🇼 本土"],["K","🇰🇷 韓籍"],["J","🇯🇵 日籍"]].map(([v,l])=>
              e("button",{key:v,className:`nat-btn${form.nat===v?" on":""}`,onClick:()=>setForm({...form,nat:v})},l)
            )
          ),
          e("label",{className:"lbl"},"所屬球隊 *（可多選）"),
          e("div",{className:"team-section"},
            Object.entries(TEAM_BY_LEAGUE).map(([league,ids])=>
              e("div",{key:league},
                e("div",{className:"team-league"},league),
                e("div",{className:"team-checks"},
                  ids.map(tid=>{
                    const on=form.t.includes(tid);
                    return e("div",{key:tid,className:`team-chk${on?" on":""}`,
                      onClick:()=>{
                        const newT=on?form.t.filter(x=>x!==tid):[...form.t,tid];
                        setForm({...form,t:newT});
                      }},
                      e("input",{type:"checkbox",checked:on,readOnly:true,style:{pointerEvents:"none"}}),
                      TEAMS[tid].n
                    );
                  })
                )
              )
            )
          ),
          e("label",{className:"lbl"},"備註（選填）"),
          e("input",{type:"text",value:form.note,onChange:ev=>setForm({...form,note:ev.target.value}),placeholder:"例：年度人氣 / 雙棲說明"}),
          e("div",{className:"form-actions"},
            e("button",{className:"btn btn-gray",onClick:cancelEdit},"取消"),
            e("button",{className:"btn btn-green",onClick:submitForm,disabled:saving},saving?"儲存中...":"✓ 儲存")
          )
        ),

        /* 工具列 */
        !editingMember&&e("div",{className:"med-toolbar"},
          e("button",{className:"btn btn-green",onClick:openNew},"➕ 新增成員"),
          e("input",{type:"text",placeholder:"搜尋成員...",value:medQ,onChange:ev=>setMedQ(ev.target.value),style:{width:140}}),
          e("select",{value:medLf,onChange:ev=>{setMedLf(ev.target.value);setMedTf("all");},style:{width:"auto",fontSize:12,padding:"5px 8px"}},
            e("option",{value:"all"},"全部聯盟"),
            LEAGUES.map(l=>e("option",{key:l,value:l},l==="CPBL"?"⚾ 棒球":l==="PLG"?"🏀 PLG":"🏀 TPBL"))
          ),
          e("select",{value:medTf,onChange:ev=>setMedTf(ev.target.value),style:{width:"auto",fontSize:12,padding:"5px 8px"}},
            e("option",{value:"all"},"全部球團"),
            medTeamsByLf.map(([id,v])=>e("option",{key:id,value:id},v.n))
          ),
          (medQ||medLf!=="all"||medTf!=="all")&&e("button",{className:"btn btn-gray btn-sm",onClick:()=>{setMedQ("");setMedLf("all");setMedTf("all");}},"清除篩選"),
          e("span",{style:{fontSize:12,color:"#aaa",marginLeft:"auto"}},`${medFiltered.length} / ${members.length} 位`),
          e("button",{className:"btn btn-gray btn-sm",onClick:resetToDefault},"還原預設")
        ),

        /* 成員表格 */
        !editingMember&&e("table",{className:"members-table"},
          e("thead",null,e("tr",null,
            ["姓名","國籍","身份","所屬球隊","備註","操作"].map(h=>e("th",{key:h},h))
          )),
          e("tbody",null,
            medFiltered.map(m=>e("tr",{key:m.id},
              e("td",null,e("strong",null,m.n)),
              e("td",null,NF[m.nat]),
              e("td",null,e("span",{className:"rb",style:{background:(RS[m.r]||RS["正式"]).bg,color:(RS[m.r]||RS["正式"]).tc}},m.r)),
              e("td",null,e("div",{className:"tr"},m.t.map(tid=>{const tm=TEAMS[tid];return tm&&e("span",{key:tid,className:"tp",style:{background:tm.bg,color:tm.tc,fontSize:9}},tm.n)}))),
              e("td",{style:{color:"#aaa",fontSize:11}},m.note||"—"),
              e("td",null,
                e("button",{className:"btn btn-blue btn-sm",style:{marginRight:4},onClick:()=>openEdit(m)},"✏ 編輯"),
                e("button",{className:"btn btn-red btn-sm",onClick:()=>deleteMemberFromList(m.id,m.n)},"🗑 刪除")
              )
            ))
          )
        )
      )
    );
  }

  /* ════════════════════════════════
     RENDER: MAIN APP
  ════════════════════════════════ */
  return e("div",null,
    restored&&e("div",{className:"alert ok",style:{marginBottom:8}},`✅ 已自動還原你上次的選擇（${myFaves.length} 位）`),
    e("div",{className:"header"},
      e("div",{className:"h-info"},
        e("h2",null,"台灣啦啦隊支持表"),
        e("p",null,e("span",{className:`sdot${online?"":" off"}`}),online?`即時同步中・${memberNames.length} 人在線`:"連線中斷...")
      ),
      e("span",{className:"room-tag"},`房間：${roomCode}`),
      e("button",{className:"hbtn",style:{marginRight:2},onClick:()=>{setPhase("admin");setAdminPhase("pw");}},"\u2699\uFE0F 管理"),
      e("button",{className:"hbtn",onClick:leave},"登出")
    ),
    e("div",{className:"tabs"},
      [["browse",`我的選擇 (${myFaves.length}♥)`],
       ["overlap",`共同支持${overlapMembers.length?` (${overlapMembers.length})`:""}`],
       ["members",`房間成員 (${memberNames.length})`]
      ].map(([k,l])=>e("button",{key:k,className:`tab${tab===k?" on":""}`,onClick:()=>setTab(k)},l))
    ),

    /* BROWSE */
    tab==="browse"&&e("div",null,
      e("div",{className:"filters"},
        e("input",{type:"search",placeholder:"搜尋...",value:q,onChange:ev=>setQ(ev.target.value),style:{width:110}}),
        e("select",{value:lf,onChange:ev=>{setLf(ev.target.value);setTf("all")}},
          e("option",{value:"all"},"全部聯盟"),
          LEAGUES.map(l=>e("option",{key:l,value:l},l==="CPBL"?"⚾ 棒球":l==="PLG"?"🏀 PLG":"🏀 TPBL"))
        ),
        e("select",{value:tf,onChange:ev=>setTf(ev.target.value)},
          e("option",{value:"all"},"全部球隊"),
          teamsByLf.map(([id,v])=>e("option",{key:id,value:id},v.n))
        ),
        e("select",{value:nf,onChange:ev=>setNf(ev.target.value)},
          e("option",{value:"all"},"全部"),
          e("option",{value:"K"},"🇰🇷 韓"),
          e("option",{value:"J"},"🇯🇵 日"),
          e("option",{value:"T"},"🇹🇼 本土")
        ),
        e("div",{className:`tog${multi?" on":""}`,onClick:()=>setMulti(!multi)},"雙棲以上"),
        e("select",{value:browseFriendFilter,onChange:ev=>setBrowseFriendFilter(ev.target.value),style:{width:"auto",fontSize:12,padding:"5px 8px",maxWidth:160}},
          e("option",{value:"all"},"👥 房間內所有人"),
          sortedRoomNicknames.map(nm=>e("option",{key:nm,value:nm},`只看「${nm}」的選擇${nm===myName?"（我）":""}`))
        ),
        browseFriendFilter!=="all"&&e("button",{className:"btn btn-gray btn-sm",onClick:()=>setBrowseFriendFilter("all")},"清除好友篩選")
      ),
      memberNames.length>0&&e("div",{className:"liker-legend"},
        e("span",{style:{fontWeight:600,color:"#888"}},"顏色對照（支持者）"),
        sortedRoomNicknames.map(nm=>e("span",{key:nm,className:"lg-item"},
          e("span",{className:"dot",style:{background:colorMap[nm]||"#aaa"}}),
          nm+(nm===myName?"（我）":"")))
      ),
      e("p",{className:"count"},browseFriendFilter==="all"
        ?`${filtered.length} 位・點卡片選擇（紅框=已選，自動儲存）`
        :`${filtered.length} 位・目前僅顯示「${browseFriendFilter}」選好的啦啦隊（可搭配上方球隊篩選找通知對象）`),
      e("div",{className:"grid"},
        filtered.map(m=>{
          const likers=whoLikes(m.id);const isMine=myFaves.includes(m.id);const rs=RS[m.r]||RS["正式"];
          const tagTids=memberTeamIdsForBrowseTags(m,lf);
          return e("div",{key:m.id,className:`card${isMine?" mine":""}`,onClick:()=>toggleFave(m.id)},
            e("div",{className:"ct"},e("span",{className:"nat"},NF[m.nat]),e("span",{className:"cn"},m.n),
              m.t.length>1&&e("span",{className:"mb"},m.t.length>2?"三棲":"雙棲")),
            e("div",null,e("span",{className:"rb",style:{background:rs.bg,color:rs.tc}},m.r)),
            e("div",{className:"tr"},tagTids.map(tid=>{const tm=TEAMS[tid];return tm&&e("span",{key:tid,className:"tp",style:{background:tm.bg,color:tm.tc}},tm.n);})),
            m.note&&e("div",{className:"note"},m.note),
            likers.length>0&&e("div",{className:"liker-pills",onClick:ev=>ev.stopPropagation()},
              likers.map(nm=>e("span",{key:nm,className:"liker-pill"},
              e("span",{className:"dot",style:{background:colorMap[nm]||"#aaa"}}),
              e("span",{style:{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:72}},nm))))
          );
        })
      )
    ),

    /* OVERLAP */
    tab==="overlap"&&e("div",null,
      overlapMembers.length===0
        ?e("div",{className:"empty"},"等朋友也進入房間選好後，這裡會顯示大家共同支持的成員！")
        :e("div",null,
          e("div",{className:"section-title"},"共同支持",e("span",null,`${overlapMembers.length} 位`)),
          e("div",{className:"og"},
            overlapMembers.map(({m,cnt,likers})=>
              e("div",{key:m.id,className:"oc"},
                e("div",{className:"oh"},
                  e("span",{className:"nat"},NF[m.nat]),
                  e("span",{className:"oh-name"},m.n),
                  e("span",{className:"oh-cnt"},`${cnt}人`)
                ),
                e("div",{className:"tr",style:{marginBottom:5}},
                  m.t.map(tid=>{const tm=TEAMS[tid];return tm&&e("span",{key:tid,className:"tp",style:{background:tm.bg,color:tm.tc}},tm.n);})),
                e("div",{className:"dots"},
                  likers.map(nm=>e("span",{key:nm,style:{display:"inline-flex",alignItems:"center",gap:3,fontSize:10,marginRight:4,color:"#888"}},
                    e("span",{className:"dot",style:{background:colorMap[nm]||"#aaa"}}),nm)))
              )
            )
          )
        )
    ),

    /* MEMBERS */
    tab==="members"&&e("div",null,
      memberNames.length===0
        ?e("div",{className:"empty"},"等待朋友加入同一個房間碼...")
        :e("div",null,
          e("div",{className:"section-title"},"房間成員",e("span",null,`房間碼：${roomCode}`)),
          e("div",{className:"mg"},
            memberNames.map((nm,i)=>{
              const d=roomData[nm]||{};
              const top=(d.faves||[]).slice(0,4).map(id=>members.find(x=>x.id===id)).filter(Boolean);
              const cnt=(d.faves||[]).length;
              return e("div",{key:nm,className:"mc mc-click",role:"button",tabIndex:0,
                onClick:()=>setRoomMemberDetail(nm),
                onKeyDown:ev=>{(ev.key==="Enter"||ev.key===" ")&&(ev.preventDefault(),setRoomMemberDetail(nm));}},
                e("h4",null,e("span",{className:"dot-lg",style:{background:FC[i%FC.length]}}),nm+(nm===myName?" (我)":""),
                  e("span",{style:{marginLeft:"auto",fontSize:10,color:"#ccc",fontWeight:400}},`${cnt}♥`)),
                cnt===0
                  ?e("div",{style:{fontSize:11,color:"#ddd"}},"尚未選擇")
                  :e("div",null,
                    top.map(m=>e("span",{key:m.id,className:"ftag"},NF[m.nat],m.n)),
                    cnt>4&&e("span",{className:"ftag",style:{color:"#888"}},`+${cnt-4} 位`),
                    e("div",{className:"mc-hint"},"點擊查看完整支持名單 →")
                  )
              );
            })
          )
        )
    ),

    roomMemberDetail&&e("div",{className:"modal-backdrop",onClick:()=>setRoomMemberDetail(null)},
      e("div",{className:"modal-sheet",onClick:ev=>ev.stopPropagation()},
        e("h3",null,e("span",{className:"dot-lg",style:{background:FC[memberNames.indexOf(roomMemberDetail)%FC.length]}}),roomMemberDetail+(roomMemberDetail===myName?"（我）":"")),
        e("div",{className:"modal-sub"},`${(roomData[roomMemberDetail]?.faves||[]).length} 位啦啦隊員`),
        e("div",{className:"modal-list"},
          (roomData[roomMemberDetail]?.faves||[]).length===0
            ?e("div",{style:{fontSize:13,color:"#bbb",padding:"12px 0"}},"尚未選擇任何人")
            :sortMembersByTeam((roomData[roomMemberDetail]?.faves||[]).map(id=>members.find(x=>x.id===id)).filter(Boolean)).map(m=>{
              const rs=RS[m.r]||RS["正式"];
              return e("div",{key:m.id,className:"modal-row"},
                e("div",{style:{flex:1,minWidth:0}},
                  e("div",{style:{fontWeight:600}},NF[m.nat]," ",m.n),
                  e("div",{className:"tr",style:{marginTop:4}},
                    m.t.map(tid=>{const tm=TEAMS[tid];return tm&&e("span",{key:tid,className:"tp",style:{background:tm.bg,color:tm.tc,fontSize:9}},tm.n);})),
                  m.note&&e("div",{style:{fontSize:11,color:"#aaa",marginTop:3}},m.note)),
                e("span",{className:"rb",style:{background:rs.bg,color:rs.tc,whiteSpace:"nowrap"}},m.r));
            })
        ),
        e("div",{style:{marginTop:14,display:"flex",justifyContent:"flex-end"}},
          e("button",{className:"btn btn-primary",onClick:()=>setRoomMemberDetail(null)},"關閉"))
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(e(App));
</script>
</body>
</html>
